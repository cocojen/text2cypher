services:
  neo4j:
    image: neo4j:5-community
    container_name: graphrag-neo4j
    ports:
      - "7474:7474"  # Neo4j Browser
      - "7687:7687"  # Bolt 프로토콜
    environment:
      - NEO4J_AUTH=neo4j/${NEO4J_PASSWORD:-graphrag123}
      - NEO4J_PLUGINS=["apoc"]
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: cypher-shell -u neo4j -p ${NEO4J_PASSWORD:-graphrag123} "RETURN 1"
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      NEO4J_URI: bolt://neo4j:7687
      OLLAMA_BASE_URL: http://host.docker.internal:11434
    depends_on:
      neo4j:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  neo4j_data:
  neo4j_logs:
